{% extends "master.html" %}
{% load static %}

{% block css %}
<link href="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-bs4.min.css" rel="stylesheet">
{% endblock css %}

{% block content %}
<div class="container-fluid">

    <!-- PAGE TITLE -->
    <div class="row">
        <div class="col-12">
            <div class="page-title-box">
                <div class="page-title-right">
                    <ol class="breadcrumb m-0">
                        <li class="breadcrumb-item"><a href="javascript:void(0);">Classes</a></li>
                        <li class="breadcrumb-item active">Edit Class</li>
                    </ol>
                </div>
                <h4 class="page-title">Edit Class</h4>
            </div>
        </div>
    </div>

    <!-- FORM -->
    <div class="row">
        <div class="col-12">
            <div class="card">

                <div class="card-body">

                    <form method="POST" enctype="multipart/form-data" id="edit-class-form">
                        {% csrf_token %}

                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label">{{ field.label }}</label>
                                {{ field }}
                                <div class="text-danger">
                                    {{ field.errors }}
                                </div>
                            </div>
                        {% endfor %}

                        <button type="submit" class="btn btn-primary">
                            <i class="mdi mdi-content-save"></i> Update Class
                        </button>

                    </form>

                </div>

            </div>
        </div>
    </div>

</div>
{% endblock content %}

{% block js %}
<script src="https://cdn.jsdelivr.net/npm/summernote@0.8.20/dist/summernote-bs4.min.js"></script>
<script src="{% static 'assets/admin/js/studio-admin/classes/edit.js' %}"></script>

{% endblock js %}
