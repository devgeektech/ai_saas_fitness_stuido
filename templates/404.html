{% load static %}
<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="utf-8" />
      <title>Admin Dashboard</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <meta content="A fully featured admin theme which can be used to build CRM, CMS, etc." name="description" />
      <meta content="Coderthemes" name="author" />
      <!-- App favicon -->
      <link rel="shortcut icon" href="{% static 'assets/images/trac-nest-logo.png' %}">
      <!-- Plugin css -->
      <link href="{% static 'assets/theme/vendor/bootstrap-datepicker/css/bootstrap-datepicker.min.css' %}" rel="stylesheet" type="text/css" />      
      <!-- App css -->
      <link href="{% static 'assets/theme/css/app-saas.min.css' %}" rel="stylesheet" type="text/css" id="app-style" />
      <link href="{% static 'admin/css/style.css' %}" rel="stylesheet" type="text/css" />
      {% csrf_token %}
   </head>
   <body class="authentication-bg position-relative">
        <div class="position-absolute start-0 end-0 start-0 bottom-0 w-100 h-100">
            <svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%' viewBox='0 0 800 800'>
                <g fill-opacity='0.22'>
                <circle style="fill: rgba(var(--ct-primary-rgb), 0.1);" cx='400' cy='400' r='600'/>
                <circle style="fill: rgba(var(--ct-primary-rgb), 0.2);" cx='400' cy='400' r='500'/>
                <circle style="fill: rgba(var(--ct-primary-rgb), 0.3);" cx='400' cy='400' r='300'/>
                <circle style="fill: rgba(var(--ct-primary-rgb), 0.4);" cx='400' cy='400' r='200'/>
                <circle style="fill: rgba(var(--ct-primary-rgb), 0.5);" cx='400' cy='400' r='100'/>
                </g>
            </svg>
        </div>
        <div class="account-pages pt-2 pt-sm-5 pb-4 pb-sm-5 position-relative">
            <div class="container">
                <div class="row justify-content-center">
                <div class="col-xxl-4 col-lg-5">
                    <div class="card">
                        <!-- Logo -->
                        <div class="card-header py-4 text-center bg-primary">
                            <a href="{% url 'admin-dashboard' %}">
                            <span><img src="{% static 'assets/images/trac-nest-logo.png' %}" alt="logo" height="50"></span>
                            </a>
                        </div>
                        <div class="card-body p-4">
                            <div class="text-center">
                                <img src="{% static 'assets/theme/images/svg/startman.svg' %}" height="120" alt="File not found Image">
                                <h1 class="text-error mt-4">404</h1>
                                <h4 class="text-uppercase text-danger mt-3">Page not found</h4>
                                <a class="btn btn-info mt-3" href="/admin/login"><i class="mdi mdi-reply"></i> Return Back</a>
                            </div>
                        </div>
                        <!-- end card-body -->
                    </div>
                    <!-- end card -->
                </div>
                <!-- end col -->
                </div>
                <!-- end row -->
            </div>
            <!-- end container -->
        </div>
        <footer class="footer footer-alt">
        <script>document.write(new Date().getFullYear())</script> ©
        </footer>
   </body>
</html>
