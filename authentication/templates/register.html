{% load static %}
<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="utf-8" />
      <title>Register</title>
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="shortcut icon" href="{% static 'assets/images/trac-nest-logo.png' %}">
      <script src="{% static 'assets/theme/js/hyper-config.js' %}"></script>
      <link href="{% static 'assets/theme/css/app-saas.min.css' %}" rel="stylesheet" type="text/css" id="app-style" />
      <link href="{% static 'assets/theme/css/icons.min.css' %}" rel="stylesheet" type="text/css" />
      <link href="{% static 'assets/theme/css/plugins/toastr/toastr.min.css' %}" rel="stylesheet" type="text/css" />
      <link href="{% static 'admin/css/style.css' %}" rel="stylesheet" type="text/css" />
      {% csrf_token %}
   </head>

   <body class="authentication-bg position-relative">
      <div class="position-absolute start-0 end-0 top-0 bottom-0 w-100 h-100">
         <svg xmlns='http://www.w3.org/2000/svg' width='100%' height='100%' viewBox='0 0 800 800'>
            <g fill-opacity='0.22'>
               <circle style="fill: rgba(var(--ct-primary-rgb), 0.1);" cx='400' cy='400' r='600'/>
               <circle style="fill: rgba(var(--ct-primary-rgb), 0.2);" cx='400' cy='400' r='500'/>
               <circle style="fill: rgba(var(--ct-primary-rgb), 0.3);" cx='400' cy='400' r='300'/>
               <circle style="fill: rgba(var(--ct-primary-rgb), 0.4);" cx='400' cy='400' r='200'/>
               <circle style="fill: rgba(var(--ct-primary-rgb), 0.5);" cx='400' cy='400' r='100'/>
            </g>
         </svg>
      </div>

      <div class="account-pages pt-2 pt-sm-5 pb-4 pb-sm-5 position-relative">
         <div class="container">
            <div class="row justify-content-center">
               <div class="col-xl-4 col-lg-5">
                  <div class="card">
                     <div class="card-header py-4 text-center bg-primary">
                        <a href="#">
                           <span>
                              <img src="{% static 'assets/images/trac-nest-logo.png' %}" alt="logo" height="100">
                           </span>
                        </a>
                     </div>
                     <div class="card-body p-4">
                        <div class="text-center w-100 m-auto mb-4">
                           <h4 class="text-dark-50 fw-bold">
                              Create Account
                           </h4>
                           <p class="text-muted">
                              Register your studio admin account
                           </p>
                        </div>

                        <form action="#" method="post" id="register_form" enctype="multipart/form-data" novalidate>
                            {% csrf_token %}
                           <!-- Email -->
                           <div class="mb-3">
                              <label class="form-label"> Email Address</label>
                              <input class="form-control" type="email" name="email" placeholder="Enter email address">
                           </div>
                           <!-- Password -->
                           <div class="mb-3">
                              <label class="form-label"> Password </label>
                              <div class="input-group input-group-merge">
                                 <input type="password" name="password" class="form-control" placeholder="Enter password">
                                 <div class="input-group-text" data-password="false">
                                    <span class="password-eye"></span>
                                 </div>

                              </div>

                           </div>

                           <!-- Confirm Password -->
                           <div class="mb-3">
                              <label class="form-label"> Confirm Password</label>
                              <div class="input-group input-group-merge">
                                 <input type="password" name="confirm_password" class="form-control" placeholder="Confirm password">
                                 <div class="input-group-text" data-password="false">
                                    <span class="password-eye"></span>
                                 </div>

                              </div>

                           </div>

                           <!-- Terms -->
                           <div class="mb-3">
                              <div class="form-check">
                                 <input type="checkbox" class="form-check-input" name="terms" id="checkbox-signup">
                                 <label class="form-check-label" for="checkbox-signup">
                                    I agree to Terms & Conditions
                                 </label>
                              </div>
                           </div>

                           <!-- Submit -->
                           <div class="mb-3 text-center">
                              <button class="btn btn-primary w-100" type="submit" id="register_button"> Register </button>
                           </div>
                        </form>

                        <!-- Login -->
                        <div class="text-center mt-3">
                           <p class="text-muted">
                              Already have an account?
                              <a href="{% url 'admin-login' %}" class="text-primary fw-bold">
                                 Sign In
                              </a>
                           </p>
                        </div>
                     </div>
                  </div>
               </div>
            </div>
         </div>
      </div>
      <!-- Footer -->
      <footer class="footer footer-alt">
         <script>
            document.write(new Date().getFullYear())
         </script>
         © AI Fitness Studio
      </footer>
      <script src="{% static 'assets/theme/js/vendor.min.js' %}"></script>
      <script src="{% static 'assets/theme/js/app.min.js' %}"></script>
      <script src="{% static 'assets/theme/js/plugins/validate/validate.js' %}"></script>
      <script src="{% static 'assets/theme/js/plugins/toastr/toastr.min.js' %}"></script>
      <script src="{% static 'assets/theme/js/register.js' %}"></script>
      {% if messages %}
         {% for message in messages %}
            <script type="text/javascript">
               toastr.{{ message.tags }}('{{ message }}')
            </script>
         {% endfor %}
      {% endif %}
   </body>
</html>
